# Example inventory. Copy to inventory.ini and adjust hosts/IPs.
# Group names are cosmetic — the playbook branches on gathered OS facts,
# not on inventory groups, so a flat [all] inventory works identically.

[rhel9]
node9-1  ansible_host=192.0.2.11
node9-2  ansible_host=192.0.2.12

[rhel10]
node10-1 ansible_host=192.0.2.21
node10-2 ansible_host=192.0.2.22

[all:vars]
ansible_user=ansible
