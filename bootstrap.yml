---
# One-time bootstrap for new managed nodes.
#
# Creates a dedicated automation account, installs the control node's SSH
# public key, and grants validated passwordless sudo — so root is used
# exactly once and never again.
#
# Usage (root password prompted, never stored):
#   ansible-playbook -i bootstrap.ini bootstrap.yml -k
#
# bootstrap.ini example:
#   [new]
#   node10-1 ansible_host=192.0.2.21
#   [new:vars]
#   ansible_user=root

- name: Bootstrap new managed nodes
  hosts: new
  gather_facts: false

  vars:
    automation_user: ansible
    # Path to the control node's public key to authorize:
    automation_pubkey: "~/.ssh/id_ed25519.pub"

  vars_prompt:
    - name: automation_password
      prompt: "Initial password for the automation account"
      private: true
      confirm: true

  tasks:
    - name: Create automation account
      ansible.builtin.user:
        name: "{{ automation_user }}"
        groups: wheel
        append: true
        password: "{{ automation_password | password_hash('sha512') }}"

    - name: Ensure .ssh directory
      ansible.builtin.file:
        path: "/home/{{ automation_user }}/.ssh"
        state: directory
        owner: "{{ automation_user }}"
        group: "{{ automation_user }}"
        mode: "0700"

    - name: Install authorized key
      ansible.builtin.copy:
        content: "{{ lookup('file', automation_pubkey) }}\n"
        dest: "/home/{{ automation_user }}/.ssh/authorized_keys"
        owner: "{{ automation_user }}"
        group: "{{ automation_user }}"
        mode: "0600"

    - name: Grant validated passwordless sudo
      ansible.builtin.copy:
        content: "{{ automation_user }} ALL=(ALL) NOPASSWD: ALL\n"
        dest: "/etc/sudoers.d/{{ automation_user }}"
        mode: "0440"
        validate: visudo -cf %s
